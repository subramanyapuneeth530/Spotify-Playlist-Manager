{% extends "base.html" %}
{% block title %}Playlists{% endblock %}
{% block page_title %}My Playlists{% endblock %}
{% block content %}

<div class="tab-row">
  <button class="tab active" onclick="filterType('all',this)">All</button>
  <button class="tab" onclick="filterType('artist',this)">Artist-only</button>
  <button class="tab" onclick="filterType('manual',this)">Manual</button>
</div>

<div style="display:flex;gap:10px;margin-bottom:16px;align-items:center;">
  <div class="search-wrap" style="max-width:260px;">
    <span class="search-icon">⌕</span>
    <input id="pl-search" class="search-input" type="text" placeholder="Filter playlists…">
  </div>
  <select id="pl-sort" class="form-select" style="width:140px;" onchange="loadPlaylists()">
    <option value="name">Sort: Name</option>
    <option value="tracks">Sort: Track count</option>
  </select>
  <span id="pl-count" style="font-size:11px;color:var(--text3);margin-left:auto;"></span>
</div>

<div class="loading-overlay show" id="pl-loading"><div class="spinner"></div> Loading playlists…</div>
<div id="pl-list" style="display:flex;flex-direction:column;gap:6px;"></div>

<div style="margin-top:20px;">
  <button class="btn" onclick="document.getElementById('merge-panel').style.display=document.getElementById('merge-panel').style.display==='none'?'block':'none'">
    ⊕ Merge playlists
  </button>
</div>
<div id="merge-panel" style="display:none;margin-top:12px;" class="card">
  <div class="card-title">Smart merge — combine playlists, remove duplicates</div>
  <div class="form-group">
    <label class="form-label">Select playlists to merge</label>
    <div id="merge-checkboxes" style="display:flex;flex-direction:column;gap:6px;max-height:200px;overflow-y:auto;"></div>
  </div>
  <div class="form-group">
    <label class="form-label">New playlist name</label>
    <input id="merge-name" class="form-input" type="text" placeholder="Merged playlist">
  </div>
  <div style="display:flex;align-items:center;gap:10px;margin-bottom:14px;">
    <div class="toggle-wrap" onclick="this.querySelector('.toggle-track').classList.toggle('on')">
      <div class="toggle-track" id="merge-public-toggle"><div class="toggle-thumb"></div></div>
      <span class="toggle-label">Make public</span>
    </div>
  </div>
  <button class="btn btn-primary" onclick="doMerge()">Merge</button>
</div>

<div id="pl-drawer" style="display:none;position:fixed;right:0;top:0;bottom:0;width:360px;background:var(--surface);border-left:1px solid var(--border2);z-index:200;overflow-y:auto;padding:24px;">
  <button onclick="closeDrawer()" style="position:absolute;top:16px;right:16px;background:none;border:none;color:var(--text3);cursor:pointer;font-size:18px;">✕</button>
  <div id="pl-drawer-content"></div>
</div>

{% endblock %}
{% block scripts %}
<script>
let currentType = 'all';
let currentAudio = null;

async function loadPlaylists() {
  const sort = document.getElementById('pl-sort').value;
  const q = document.getElementById('pl-search').value;
  document.getElementById('pl-loading').classList.add('show');
  document.getElementById('pl-list').style.display = 'none';
  const params = new URLSearchParams({ sort });
  if (q) params.set('q', q);
  if (currentType !== 'all') params.set('type', currentType);
  const data = await fetch('/api/playlists?' + params).then(r => r.json());
  document.getElementById('pl-loading').classList.remove('show');
  document.getElementById('pl-list').style.display = 'flex';
  document.getElementById('pl-count').textContent = data.length + ' playlists';
  document.getElementById('pl-list').innerHTML = data.map(p => {
    const safeName = p.name.replace(/\\/g,'\\\\').replace(/'/g,"\\'").replace(/"/g,'&quot;');
    return '<div class="pl-row" onclick="openPlaylist(\'' + p.id + '\',\'' + safeName + '\')">'
      + (p.image ? '<img class="pl-cover" src="' + p.image + '" alt="">' : '<div class="pl-cover">♪</div>')
      + '<div style="flex:1;min-width:0;"><div class="pl-name">' + p.name + '</div>'
      + '<div class="pl-meta">' + p.total + ' tracks · ' + (p.owner||'') + '</div></div>'
      + (p.name.includes('— all tracks') ? '<span class="badge badge-success">artist</span>' : '<span class="badge badge-accent">manual</span>')
      + '</div>';
  }).join('');
  document.getElementById('merge-checkboxes').innerHTML = data.map(p =>
    '<label style="display:flex;align-items:center;gap:8px;font-size:12px;color:var(--text2);cursor:pointer;">'
    + '<input type="checkbox" value="' + p.id + '" style="accent-color:var(--accent);">'
    + p.name + ' <span style="color:var(--text3);font-size:10px;">(' + p.total + ')</span></label>'
  ).join('');
}

async function openPlaylist(id, name) {
  const drawer = document.getElementById('pl-drawer');
  const content = document.getElementById('pl-drawer-content');
  drawer.style.display = 'block';
  content.innerHTML = '<div style="font-size:15px;font-weight:600;color:var(--text);margin-bottom:16px;padding-right:28px;">' + name + '</div>'
    + '<div class="loading-overlay show"><div class="spinner"></div> Loading tracks…</div>';
  const tracks = await fetch('/api/playlist/' + id + '/tracks').then(r => r.json());
  const totalMs = tracks.reduce(function(s,t){ return s + (t.duration_ms||0); }, 0);
  const hrs = Math.floor(totalMs/3600000);
  const mins = Math.floor((totalMs%3600000)/60000);
  const duration = hrs > 0 ? (hrs + 'h ' + mins + 'm') : (mins + 'm');
  content.innerHTML = '<div style="margin-bottom:16px;padding-right:28px;">'
    + '<div style="font-size:15px;font-weight:600;color:var(--text);margin-bottom:4px;">' + name + '</div>'
    + '<div style="font-size:11px;color:var(--text3);">' + tracks.length + ' tracks · ' + duration + '</div></div>'
    + '<div style="display:flex;flex-direction:column;gap:5px;">'
    + tracks.map(function(t,i){
        const mins2 = Math.floor(t.duration_ms/60000);
        const secs2 = String(Math.floor((t.duration_ms%60000)/1000)).padStart(2,'0');
        return '<div style="display:flex;align-items:center;gap:10px;padding:8px 10px;background:var(--surface2);border:1px solid var(--border);border-radius:var(--radius);">'
          + '<span style="font-size:10px;color:var(--text3);width:18px;flex-shrink:0;text-align:right;">' + (i+1) + '</span>'
          + '<div style="flex:1;min-width:0;">'
          + '<div style="font-size:12px;font-weight:500;color:var(--text);overflow:hidden;text-overflow:ellipsis;white-space:nowrap;">' + t.name + '</div>'
          + '<div style="font-size:10px;color:var(--text3);margin-top:1px;">' + (t.artist_names||[]).join(', ') + '</div></div>'
          + '<span style="font-size:10px;color:var(--text3);flex-shrink:0;">' + mins2 + ':' + secs2 + '</span>'
          + (t.preview_url ? '<button class="preview-play" onclick="togglePreview(this,\'' + t.preview_url + '\')">▶</button>' : '')
          + '</div>';
      }).join('')
    + '</div>';
}

function closeDrawer() {
  document.getElementById('pl-drawer').style.display = 'none';
  if (currentAudio) { currentAudio.pause(); currentAudio = null; }
}

function togglePreview(btn, url) {
  if (currentAudio) { currentAudio.pause(); currentAudio = null; document.querySelectorAll('.preview-play').forEach(function(b){b.textContent='▶';}); }
  if (btn.textContent === '▶') {
    currentAudio = new Audio(url); currentAudio.play(); btn.textContent = '⏹';
    currentAudio.onended = function(){ btn.textContent = '▶'; currentAudio = null; };
  }
}

function filterType(type, btn) {
  currentType = type;
  document.querySelectorAll('.tab').forEach(function(t){t.classList.remove('active');});
  btn.classList.add('active');
  loadPlaylists();
}

async function doMerge() {
  const checked = Array.from(document.querySelectorAll('#merge-checkboxes input:checked')).map(function(i){return i.value;});
  const name = document.getElementById('merge-name').value.trim();
  const isPublic = document.getElementById('merge-public-toggle').classList.contains('on');
  if (checked.length < 2) { showToast('Select at least 2 playlists'); return; }
  if (!name) { showToast('Enter a playlist name'); return; }
  showToast('Merging playlists…');
  try {
    const resp = await fetch('/api/playlists/merge', { method:'POST', headers:{'Content-Type':'application/json'}, body:JSON.stringify({playlist_ids:checked,name:name,public:isPublic}) });
    const data = await resp.json();
    if (data.error) throw new Error(data.error);
    showToast('✓ "' + data.name + '" created with ' + data.track_count + ' tracks');
    document.getElementById('merge-panel').style.display = 'none';
    loadPlaylists();
  } catch(e) { showToast('Error: ' + e.message); }
}

document.getElementById('pl-search').addEventListener('input', loadPlaylists);
document.addEventListener('DOMContentLoaded', loadPlaylists);
</script>
{% endblock %}
