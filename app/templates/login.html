<!DOCTYPE html>
<html lang="en" data-theme="cyber">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Melodex — Login</title>
  <link rel="stylesheet" href="/static/css/themes.css">
  <link rel="stylesheet" href="/static/css/base.css">
  <style>
    body { display: flex; align-items: center; justify-content: center; min-height: 100vh; }
    .login-box {
      background: var(--surface);
      border: 1px solid var(--border2);
      border-radius: var(--radius);
      padding: 48px 40px;
      text-align: center;
      max-width: 360px;
      width: 100%;
    }
    .login-logo { font-size: 28px; font-weight: 700; color: var(--accent); letter-spacing: 2px; margin-bottom: 6px; }
    .login-sub { font-size: 12px; color: var(--text3); margin-bottom: 32px; }
    .login-desc { font-size: 13px; color: var(--text2); margin-bottom: 28px; line-height: 1.6; }
    .login-btn {
      display: inline-block;
      padding: 12px 32px;
      background: var(--btn-bg);
      color: var(--btn-text);
      border-radius: var(--radius);
      font-size: 13px;
      font-weight: 600;
      font-family: var(--font-body);
      text-decoration: none;
      letter-spacing: 0.5px;
      transition: opacity 0.15s;
    }
    .login-btn:hover { opacity: 0.85; text-decoration: none; }
    .login-scopes { font-size: 10px; color: var(--text3); margin-top: 20px; line-height: 1.8; }

    .theme-row { display: flex; justify-content: center; gap: 8px; margin-bottom: 28px; }
    .theme-btn { width: 18px; height: 18px; border-radius: 50%; cursor: pointer; border: 2px solid transparent; }
    .theme-btn.active { border-color: var(--text); }
    {% if error %}
    .error-msg { color: #E24B4A; font-size: 12px; margin-bottom: 16px; padding: 8px 12px; background: #FCEBEB; border-radius: var(--radius); }
    {% endif %}
  </style>
</head>
<body>
  <div class="login-box">
    <div class="login-logo" id="logo-name">MELODEX</div>
    <div class="login-sub"  id="logo-sub">// playlist manager</div>

    <div class="theme-row">
      <div class="theme-btn active" data-theme="cyber"    style="background:#00ff95;"                    title="Cyber"></div>
      <div class="theme-btn"        data-theme="paper"    style="background:#7a3b1e;"                    title="Paper"></div>
      <div class="theme-btn"        data-theme="aurora"   style="background:#3344ee;"                    title="Aurora"></div>
      <div class="theme-btn"        data-theme="obsidian" style="background:#d2a850;"                    title="Obsidian"></div>
      <div class="theme-btn"        data-theme="chalk"    style="background:#fff;border:1px solid #888;" title="Chalk"></div>
    </div>

    {% if error %}
    <div class="error-msg">{{ error }}</div>
    {% endif %}

    <div class="login-desc">
      Connect your Spotify account to analyse playlists, track duplicates, and build artist collections.
    </div>

    <a href="/login" class="login-btn">Connect Spotify</a>

    <div class="login-scopes">
      Requires: read playlists · modify playlists<br>
      recently played · user profile
    </div>
  </div>

  <script src="/static/js/theme.js"></script>
</body>
</html>
